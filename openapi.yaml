          description: Finish date and time
          example: '2024-06-15T14:30:00Z'
        flyoverJobId:
          type: string
          description: Flyover video generation job ID (if flyover API is configured)
          example: a1b2c3d4e5f6
      required:
        - userId
        - finishedAt
    FlyoverCallbackDto:
      type: object
      properties:
        job_id:
          type: string
          description: Flyover job ID
        status:
          type: string
          description: Job status
          enum:
            - completed
            - failed
        url:
          type: string
          description: Presigned URL for the generated video
        error:
          type: string
          description: Error message if the job failed
      required:
        - job_id
        - status
    FlyoverStatusDto:
      type: object
      properties:
        status:
          type: string
          description: Flyover video status
          enum:
            - none
            - pending
            - completed
            - failed
          example: completed
        url:
          type: string
          description: Presigned URL for the generated video (when status is completed)
          example: https://s3.example.com/flyover-videos/abc123.mp4?...
        error:
          type: string
          description: Error message (when status is failed)
      required:
        - status
    RankingDto:
      type: object
      properties:
        user:
          description: User information
          allOf:
            - $ref: '#/components/schemas/UserDto'
        position:
          description: Position coordinates
          allOf:
            - $ref: '#/components/schemas/PositionDto'
        lastPosition:
          description: Last position coordinates (previous update)
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PositionDto'
        status:
          type: string
          description: User status
          example: finished
          enum:
            - finished
            - in_progress
        endDate:
          type: object
          description: Contest end date (null if not finished)
          example: '2024-06-15T14:30:00Z'
          nullable: true
        lastPositionUpdate:
          format: date-time
          type: string
          description: Timestamp of last position update
          example: '2024-06-15T14:30:00Z'
        sent:
          type: boolean
          description: Whether the participant has sent at least one position update
          example: true
        distance:
          type: number
          description: Distance in kilometers from the contest target
          example: 42.5
        progressPercentage:
          type: number
          description: Percentage of total distance covered from starting position to target
          example: 67.8
        activityStatus:
          type: string
          description: 'Activity status: FINISHED (race completed), INACTIVE (no position update for 1h), ON_ROAD (moved >100m in last 1h), WAITING (position unchanged)'
          example: ON_ROAD
          enum:
            - FINISHED
            - INACTIVE
            - ON_ROAD
            - WAITING
      required:
        - user
        - position
        - lastPosition
        - status
        - endDate
        - lastPositionUpdate
        - sent
        - distance
        - progressPercentage
        - activityStatus
